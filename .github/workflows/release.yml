name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0, or leave empty to auto-detect from latest tag)'
        required: false

permissions:
  contents: write  # Required to create releases and upload assets

jobs:
  release:
    name: Build, Sign, Notarize, and Release
    runs-on: macos-14

    steps:
      # ==================== SETUP ====================

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # Need full history to check branch

      - name: Verify tag is on main or release branch
        if: github.ref_type == 'tag'
        run: |
          echo "ЁЯФН Verifying that tag ${{ github.ref_name }} is on an allowed branch..."

          # Get the commit hash of the tag
          TAG_COMMIT=$(git rev-parse ${{ github.ref_name }})

          # Check if this commit is reachable from main or a release/* branch.
          # Under the release branch model, RC and final release tags are created
          # on release/* branches, not main. See plans/rc-process.md.
          FOUND=false
          if git merge-base --is-ancestor "$TAG_COMMIT" origin/main 2>/dev/null; then
            echo "тЬЕ Tag is on main branch (or ancestor of main)"
            FOUND=true
          else
            for branch in $(git branch -r --list 'origin/release/*'); do
              if git merge-base --is-ancestor "$TAG_COMMIT" "$branch" 2>/dev/null; then
                echo "тЬЕ Tag is on ${branch} (release branch)"
                FOUND=true
                break
              fi
            done
          fi

          if [ "$FOUND" = false ]; then
            echo "::error::Tag ${{ github.ref_name }} is NOT on main or any release/* branch!"
            echo "::error::Release tags must be created from main or a release/* branch."
            exit 1
          fi

      - name: Validate required secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          MISSING_SECRETS=()

          if [[ -z "$APPLE_TEAM_ID" ]]; then
            MISSING_SECRETS+=("APPLE_TEAM_ID")
          fi
          if [[ -z "$APPLE_CERTIFICATE_BASE64" ]]; then
            MISSING_SECRETS+=("APPLE_CERTIFICATE_BASE64")
          fi
          if [[ -z "$APPLE_CERTIFICATE_PASSWORD" ]]; then
            MISSING_SECRETS+=("APPLE_CERTIFICATE_PASSWORD")
          fi
          if [[ -z "$APPLE_ID" ]]; then
            MISSING_SECRETS+=("APPLE_ID")
          fi
          if [[ -z "$APPLE_APP_PASSWORD" ]]; then
            MISSING_SECRETS+=("APPLE_APP_PASSWORD")
          fi

          if [[ ${#MISSING_SECRETS[@]} -gt 0 ]]; then
            echo "::error::Missing required GitHub secrets: ${MISSING_SECRETS[*]}"
            echo ""
            echo "Please configure the following secrets in your GitHub repository settings:"
            for secret in "${MISSING_SECRETS[@]}"; do
              echo "  - $secret"
            done
            echo ""
            echo "See plans/release-process.md for setup instructions."
            exit 1
          fi

          echo "тЬЕ All required secrets are configured"

      - name: Extract version from tag or input
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Triggered by tag push
            VERSION=${GITHUB_REF#refs/tags/}
            VERSION=${VERSION#v}  # Remove 'v' prefix if present
            echo "ЁЯУМ Using tag version: $VERSION"
          else
            # Triggered by workflow_dispatch
            PROVIDED_VERSION="${{ github.event.inputs.version }}"
            if [[ -n "$PROVIDED_VERSION" ]]; then
              VERSION="$PROVIDED_VERSION"
              echo "ЁЯУМ Using provided version: $VERSION"
            else
              # Auto-detect latest tag
              echo "ЁЯФН Auto-detecting version from latest tag..."
              LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
              if [[ -z "$LATEST_TAG" ]]; then
                echo "::error::No releases found. Please provide a version manually."
                exit 1
              fi
              VERSION=${LATEST_TAG#v}  # Remove 'v' prefix
              echo "ЁЯУМ Auto-detected version: $VERSION"
            fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "ЁЯУж Building version: $VERSION"

      - name: Verify changelog entry exists
        run: |
          echo "ЁЯУЭ Checking for changelog entry for version ${VERSION}..."

          if ! grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error::No changelog entry found for version ${VERSION}"
            echo "::error::Please add a changelog entry to CHANGELOG.md before creating a release"
            echo ""
            echo "Expected format in CHANGELOG.md:"
            echo "## [${VERSION}] - $(date -u +'%Y-%m-%d')"
            exit 1
          fi

          echo "тЬЕ Found changelog entry for version ${VERSION}"

      - name: Detect pre-release from version string
        run: |
          if [[ "$VERSION" =~ -(beta|alpha|rc) ]]; then
            echo "PRERELEASE=true" >> $GITHUB_ENV
            echo "ЁЯзк Detected pre-release version"
          else
            echo "PRERELEASE=false" >> $GITHUB_ENV
            echo "ЁЯЪА Detected production release version"
          fi

      - name: Set build timestamp
        run: echo "BUILD_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV

      - name: Compute build number
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "ЁЯУМ Build number: $BUILD_NUMBER"

      # ==================== DEPENDENCIES ====================

      - name: Setup MacDown build environment
        uses: ./.github/actions/setup-macdown

      - name: Run tests before release
        run: |
          echo "ЁЯзк Running unit tests to ensure code quality before release..."
          xcodebuild test \
            -workspace "MacDown 3000.xcworkspace" \
            -scheme MacDown \
            -derivedDataPath DerivedData
          echo "тЬЕ All tests passed"

      - name: Install build tools
        run: brew install create-dmg jq

      # ==================== CODE SIGNING SETUP ====================

      - name: Setup code signing keychain
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "ЁЯФР Setting up code signing keychain..."

          # Generate random password for temporary keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import Developer ID certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12

          # Use trap to ensure certificate cleanup even on error
          trap 'rm -f certificate.p12' EXIT

          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          # Prevent codesign from prompting for keychain password
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain

          # Verify certificate is available
          echo "ЁЯУЛ Available code signing identities:"
          security find-identity -v -p codesigning

      - name: Validate certificate expiry
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "ЁЯУЕ Checking certificate expiry..."

          # Extract certificate from keychain
          security find-certificate -a -c "Developer ID Application" -p build.keychain | \
            openssl x509 -noout -subject -dates > cert-info.txt 2>/dev/null || true

          if [[ -s cert-info.txt ]]; then
            cat cert-info.txt

            # Extract expiry date (format: notAfter=Jan 1 00:00:00 2025 GMT)
            EXPIRY_STR=$(grep "notAfter=" cert-info.txt | sed 's/notAfter=//')

            if [[ -n "$EXPIRY_STR" ]]; then
              # Convert to epoch (macOS date command)
              EXPIRY_EPOCH=$(date -j -f "%b %d %T %Y %Z" "$EXPIRY_STR" +%s 2>/dev/null || echo 0)
              NOW_EPOCH=$(date +%s)

              if [[ $EXPIRY_EPOCH -gt 0 ]]; then
                DAYS_UNTIL_EXPIRY=$(( ($EXPIRY_EPOCH - $NOW_EPOCH) / 86400 ))

                if [[ $DAYS_UNTIL_EXPIRY -lt 0 ]]; then
                  echo "::error::Certificate has expired!"
                  exit 1
                elif [[ $DAYS_UNTIL_EXPIRY -lt 30 ]]; then
                  echo "::warning::Certificate expires in $DAYS_UNTIL_EXPIRY days - please renew soon"
                elif [[ $DAYS_UNTIL_EXPIRY -lt 90 ]]; then
                  echo "::notice::Certificate expires in $DAYS_UNTIL_EXPIRY days"
                else
                  echo "тЬЕ Certificate is valid (expires in $DAYS_UNTIL_EXPIRY days)"
                fi
              fi
            fi
          fi

          rm -f cert-info.txt

      # ==================== BUILD ====================

      - name: Build and sign MacDown
        timeout-minutes: 30
        uses: ./.github/actions/build-macdown
        with:
          enable-signing: true
          team-id: ${{ secrets.APPLE_TEAM_ID }}
          marketing-version: ${{ env.VERSION }}
          build-number: ${{ env.BUILD_NUMBER }}

      - name: Sign CLI binary explicitly
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "ЁЯФР Signing macdown CLI binary..."

          CLI_BINARY="build/MacDown 3000.app/Contents/SharedSupport/bin/macdown"

          # Verify CLI binary exists
          if [ ! -f "$CLI_BINARY" ]; then
            echo "::error::CLI binary not found at expected location: $CLI_BINARY"
            exit 1
          fi

          # Get the exact signing identity (same as DMG signing)
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | \
                     grep "Developer ID Application" | \
                     grep "$APPLE_TEAM_ID" | \
                     head -1 | \
                     sed -E 's/.*"(.+)"/\1/')

          if [[ -z "$IDENTITY" ]]; then
            echo "::error::Could not find Developer ID Application certificate"
            exit 1
          fi

          echo "Using signing identity: $IDENTITY"

          # Sign the CLI binary with full signing options
          # --force: Replace existing signature from CodeSignOnCopy
          # --options runtime: Enable hardened runtime (required for notarization)
          # --timestamp: Add secure timestamp from Apple's servers
          codesign --sign "$IDENTITY" \
            --force \
            --options runtime \
            --timestamp \
            "$CLI_BINARY"

          echo "тЬЕ CLI binary signed successfully"

          # Re-sign nested components inside-out to preserve per-component
          # entitlements. Using --deep would apply the app's entitlements to
          # ALL nested components, stripping the QL extension's sandbox
          # entitlement and preventing macOS from loading it (issue #284).
          echo "ЁЯФР Re-signing Quick Look extension..."
          codesign --sign "$IDENTITY" \
            --force \
            --options runtime \
            --entitlements "MacDownQuickLook/MacDownQuickLook.entitlements" \
            --timestamp \
            "build/MacDown 3000.app/Contents/PlugIns/MacDownQuickLook.appex"

          echo "ЁЯФР Re-signing app bundle to update code signature seal..."
          codesign --sign "$IDENTITY" \
            --force \
            --options runtime \
            --entitlements "MacDown/MacDown.entitlements" \
            --timestamp \
            "build/MacDown 3000.app"

          echo "тЬЕ App bundle re-signed successfully"

      - name: Verify code signature
        run: |
          echo "ЁЯФН Verifying code signature..."
          codesign -vvv --deep --strict build/"MacDown 3000.app"
          codesign -d -r- build/"MacDown 3000.app"

          # Verify it's signed with Developer ID
          SIGNING_IDENTITY=$(codesign -dvv build/"MacDown 3000.app" 2>&1 | grep "Authority=Developer ID Application")
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "::error::App is not signed with Developer ID Application certificate"
            exit 1
          fi
          echo "тЬЕ Verified signature: $SIGNING_IDENTITY"

          # Verify CLI binary signature explicitly
          echo "ЁЯФН Verifying CLI binary signature..."
          CLI_BINARY="build/MacDown 3000.app/Contents/SharedSupport/bin/macdown"

          codesign -vvv --strict "$CLI_BINARY"

          # Verify CLI binary is signed with Developer ID
          CLI_SIGNING_IDENTITY=$(codesign -dvv "$CLI_BINARY" 2>&1 | grep "Authority=Developer ID Application")
          if [[ -z "$CLI_SIGNING_IDENTITY" ]]; then
            echo "::error::CLI binary is not signed with Developer ID Application certificate"
            exit 1
          fi
          echo "тЬЕ Verified CLI binary signature: $CLI_SIGNING_IDENTITY"

          # Verify CLI binary has hardened runtime
          CLI_FLAGS=$(codesign -dvv "$CLI_BINARY" 2>&1 | grep "flags=" || true)
          if [[ "$CLI_FLAGS" != *"runtime"* ]]; then
            echo "::error::CLI binary does not have hardened runtime enabled"
            echo "Flags found: $CLI_FLAGS"
            exit 1
          fi
          echo "тЬЕ CLI binary has hardened runtime enabled"

          # Show CLI binary signature details
          echo "ЁЯУЛ CLI binary signature details:"
          codesign -dvv "$CLI_BINARY" 2>&1 | head -20

          # Verify the app bundle still carries the file-access entitlement.
          # The post-build re-sign previously stripped entitlements, shipping builds
          # that hit ViewBridge error 14 on Move To / Save AsтАж (issue #302). This gate
          # ensures a build can NEVER ship without it.
          echo "ЁЯФН Verifying app entitlements..."
          APP_ENTITLEMENTS=$(codesign -d --entitlements :- "build/MacDown 3000.app" 2>/dev/null || true)
          if [[ "$APP_ENTITLEMENTS" != *"com.apple.security.files.user-selected.read-write"* ]]; then
            echo "::error::App bundle is missing com.apple.security.files.user-selected.read-write entitlement"
            echo "::error::This breaks NSSavePanel (Move To / Save AsтАж) on macOS Sequoia and later. See issue #302."
            echo "Entitlements found:"
            echo "$APP_ENTITLEMENTS"
            exit 1
          fi
          echo "тЬЕ App bundle has the user-selected.read-write entitlement"

          # Verify Quick Look extension has sandbox entitlement (issue #284)
          echo "ЁЯФН Verifying Quick Look extension entitlements..."
          QL_APPEX="build/MacDown 3000.app/Contents/PlugIns/MacDownQuickLook.appex"
          if [ ! -d "$QL_APPEX" ]; then
            echo "::error::Quick Look extension not found at expected location: $QL_APPEX"
            exit 1
          fi
          QL_ENTITLEMENTS=$(codesign -d --entitlements :- "$QL_APPEX" 2>/dev/null || true)
          if [[ "$QL_ENTITLEMENTS" != *"com.apple.security.app-sandbox"* ]]; then
            echo "::error::Quick Look extension is missing com.apple.security.app-sandbox entitlement"
            echo "::error::Without sandbox, macOS will not load the extension. See issue #284."
            echo "Entitlements found:"
            echo "$QL_ENTITLEMENTS"
            exit 1
          fi
          echo "тЬЕ Quick Look extension has sandbox entitlement"

          echo "тЬЕ Application bundle ready"

      # ==================== CREATE DMG ====================

      - name: Create DMG installer
        run: |
          echo "ЁЯТ┐ Creating DMG installer..."

          # Try create-dmg first (better UX)
          if create-dmg \
            --volname "MacDown 3000" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "MacDown 3000.app" 200 190 \
            --hide-extension "MacDown 3000.app" \
            --app-drop-link 600 185 \
            --no-internet-enable \
            "build/MacDown-${VERSION}.dmg" \
            "build/MacDown 3000.app" 2>&1; then
            echo "тЬЕ DMG created with create-dmg"
          else
            echo "тЪая╕П create-dmg failed, falling back to hdiutil..."
            hdiutil create -volname "MacDown 3000" \
              -srcfolder "build/MacDown 3000.app" \
              -ov -format UDZO \
              "build/MacDown-${VERSION}.dmg"
            echo "тЬЕ DMG created with hdiutil"
          fi

          # Display DMG info
          ls -lh "build/MacDown-${VERSION}.dmg"
          echo "DMG size: $(du -h "build/MacDown-${VERSION}.dmg" | cut -f1)"

      - name: Verify app bundle inside DMG
        run: |
          echo "ЁЯФН Verifying app bundle inside DMG..."

          # Mount the DMG
          hdiutil attach "build/MacDown-${VERSION}.dmg" -mountpoint /tmp/dmg-verify -nobrowse -readonly

          # Verify the app signature inside
          codesign -vvv --deep --strict "/tmp/dmg-verify/MacDown 3000.app"

          # Verify it's signed with Developer ID
          SIGNING_IDENTITY=$(codesign -dvv "/tmp/dmg-verify/MacDown 3000.app" 2>&1 | grep "Authority=Developer ID Application")
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "::error::App inside DMG is not properly signed"
            hdiutil detach /tmp/dmg-verify
            exit 1
          fi

          echo "тЬЕ App bundle inside DMG is properly signed: $SIGNING_IDENTITY"

          # Verify the packaged app still carries the file-access entitlement (issue #302)
          echo "ЁЯФН Verifying app entitlements inside DMG..."
          DMG_APP_ENTITLEMENTS=$(codesign -d --entitlements :- "/tmp/dmg-verify/MacDown 3000.app" 2>/dev/null || true)
          if [[ "$DMG_APP_ENTITLEMENTS" != *"com.apple.security.files.user-selected.read-write"* ]]; then
            echo "::error::App inside DMG is missing com.apple.security.files.user-selected.read-write entitlement"
            echo "::error::This breaks NSSavePanel (Move To / Save AsтАж) on macOS Sequoia and later. See issue #302."
            echo "Entitlements found:"
            echo "$DMG_APP_ENTITLEMENTS"
            hdiutil detach /tmp/dmg-verify
            exit 1
          fi
          echo "тЬЕ App inside DMG has the user-selected.read-write entitlement"

          # Verify Quick Look extension entitlements inside DMG (issue #284)
          echo "ЁЯФН Verifying Quick Look extension entitlements inside DMG..."
          QL_APPEX_IN_DMG="/tmp/dmg-verify/MacDown 3000.app/Contents/PlugIns/MacDownQuickLook.appex"
          if [ ! -d "$QL_APPEX_IN_DMG" ]; then
            echo "::error::Quick Look extension not found in DMG"
            hdiutil detach /tmp/dmg-verify
            exit 1
          fi
          QL_DMG_ENTITLEMENTS=$(codesign -d --entitlements :- "$QL_APPEX_IN_DMG" 2>/dev/null || true)
          if [[ "$QL_DMG_ENTITLEMENTS" != *"com.apple.security.app-sandbox"* ]]; then
            echo "::error::Quick Look extension in DMG is missing com.apple.security.app-sandbox entitlement"
            echo "::error::Without sandbox, macOS will not load the extension. See issue #284."
            echo "Entitlements found:"
            echo "$QL_DMG_ENTITLEMENTS"
            hdiutil detach /tmp/dmg-verify
            exit 1
          fi
          echo "тЬЕ Quick Look extension inside DMG has sandbox entitlement"

          # Verify CLI binary inside DMG
          echo "ЁЯФН Verifying CLI binary inside DMG..."
          CLI_BINARY_IN_DMG="/tmp/dmg-verify/MacDown 3000.app/Contents/SharedSupport/bin/macdown"

          if [ ! -f "$CLI_BINARY_IN_DMG" ]; then
            echo "::error::CLI binary not found in DMG"
            hdiutil detach /tmp/dmg-verify
            exit 1
          fi

          codesign -vvv --strict "$CLI_BINARY_IN_DMG"

          CLI_IN_DMG_IDENTITY=$(codesign -dvv "$CLI_BINARY_IN_DMG" 2>&1 | grep "Authority=Developer ID Application")
          if [[ -z "$CLI_IN_DMG_IDENTITY" ]]; then
            echo "::error::CLI binary in DMG is not properly signed"
            hdiutil detach /tmp/dmg-verify
            exit 1
          fi

          # Verify CLI binary in DMG has hardened runtime
          CLI_DMG_FLAGS=$(codesign -dvv "$CLI_BINARY_IN_DMG" 2>&1 | grep "flags=" || true)
          if [[ "$CLI_DMG_FLAGS" != *"runtime"* ]]; then
            echo "::error::CLI binary in DMG does not have hardened runtime enabled"
            hdiutil detach /tmp/dmg-verify
            exit 1
          fi

          echo "тЬЕ CLI binary inside DMG is properly signed: $CLI_IN_DMG_IDENTITY"
          echo "тЬЕ CLI binary in DMG has hardened runtime enabled"

          # Unmount
          hdiutil detach /tmp/dmg-verify

      - name: Sign DMG
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "ЁЯФР Signing DMG..."

          # Get the exact signing identity to avoid ambiguity
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | \
                     grep "Developer ID Application" | \
                     grep "$APPLE_TEAM_ID" | \
                     head -1 | \
                     sed -E 's/.*"(.+)"/\1/')

          if [[ -z "$IDENTITY" ]]; then
            echo "::error::Could not find Developer ID Application certificate for team $APPLE_TEAM_ID"
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi

          echo "Using signing identity: $IDENTITY"

          # Sign the DMG with explicit identity
          # Note: --options runtime is NOT used for DMG files (only for executables)
          codesign --sign "$IDENTITY" \
            --timestamp \
            --force \
            "build/MacDown-${VERSION}.dmg"

          echo "тЬЕ DMG signed"

      - name: Verify DMG signature
        run: |
          echo "ЁЯФН Verifying DMG signature..."

          # Verify the DMG signature
          codesign -vvv --deep --strict "build/MacDown-${VERSION}.dmg"

          # Show signature details
          codesign -dvv "build/MacDown-${VERSION}.dmg" 2>&1 | grep "Authority="

          # Verify it's signed with Developer ID
          SIGNING_IDENTITY=$(codesign -dvv "build/MacDown-${VERSION}.dmg" 2>&1 | grep "Authority=Developer ID Application")
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "::error::DMG is not signed with Developer ID Application certificate"
            exit 1
          fi
          echo "тЬЕ Verified DMG signature: $SIGNING_IDENTITY"

      - name: Generate checksums
        run: |
          echo "ЁЯФР Generating SHA256 checksums..."

          cd build
          shasum -a 256 "MacDown-${VERSION}.dmg" > "MacDown-${VERSION}.dmg.sha256"

          echo "Checksum file contents:"
          cat "MacDown-${VERSION}.dmg.sha256"

          # Save checksum to environment for use in release notes
          CHECKSUM=$(cat "MacDown-${VERSION}.dmg.sha256")
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_ENV

          echo "тЬЕ Checksums generated"

      # ==================== NOTARIZATION ====================

      - name: Submit DMG for notarization
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "ЁЯУд Submitting DMG for notarization..."

          # Submit for notarization without waiting (fast, doesn't tie up runner)
          xcrun notarytool submit "build/MacDown-${VERSION}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --no-wait \
            --output-format json > notarization-response.json

          # Extract submission ID
          SUBMISSION_ID=$(jq -r '.id' notarization-response.json)

          # Validate submission ID
          if [[ -z "$SUBMISSION_ID" ]] || [[ "$SUBMISSION_ID" == "null" ]]; then
            echo "::error::Failed to extract notarization submission ID"
            echo "Response from Apple:"
            cat notarization-response.json
            exit 1
          fi

          echo "тЬЕ Notarization submitted successfully"
          echo ""
          echo "ЁЯУЛ Submission ID: $SUBMISSION_ID"
          echo ""
          echo "тП│ Notarization typically takes 5-15 minutes (sometimes up to 45 minutes)"
          echo "ЁЯУз You will receive an email from Apple when complete"
          echo ""
          echo "Next steps:"
          echo "1. Wait for Apple's email confirmation"
          echo "2. Run the 'Staple and Publish Release' workflow to complete the release"

          # Save submission ID for reference
          echo "NOTARIZATION_ID=$SUBMISSION_ID" >> $GITHUB_ENV

      # ==================== CREATE RELEASE ====================

      - name: Generate release notes
        run: |
          echo "ЁЯУЭ Generating release notes from CHANGELOG.md..."

          # Extract changelog for this version using string matching (not regex)
          CHANGELOG_CONTENT=$(awk -v ver="${VERSION}" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") > 0) {
                found=1
                next
              }
            }
            found && /^## / { exit }
            found && !/^---$/ { print }
          ' CHANGELOG.md)

          if [ -z "$CHANGELOG_CONTENT" ]; then
            echo "::error::Failed to extract changelog content for version ${VERSION}"
            exit 1
          fi

          echo "тЬЕ Extracted changelog for version ${VERSION}"

          # Create release notes with changelog + notarization status
          cat > build/release-notes.md <<EOF
          **MacDown 3000** is a modern, open-source Markdown editor for macOS.

          ${CHANGELOG_CONTENT}

          ---

          ## Release Status

          тЪая╕П **Notarization in progress** - This release is not yet ready for distribution.

          ### Current Status

          - тЬЕ Application bundle built and signed
          - тЬЕ DMG created and signed
          - тП│ Submitted for Apple notarization (typically takes 5-15 minutes)
          - тЭМ Not yet stapled

          **Notarization Details:**
          - Submission ID: \`${NOTARIZATION_ID}\`

          ### Next Steps

          After receiving Apple's notarization approval email:

          1. Go to **Actions** тЖТ **Staple and Publish Release**
          2. Click **Run workflow**
          3. Enter the release tag: \`${TAG_NAME}\`

          The workflow will automatically:
          - Staple the notarization ticket to the DMG
          - Update the release with the stapled DMG
          - Update these release notes with installation instructions

          ### Verification (Unstapled DMG)

          **SHA256 Checksum:**
          \`\`\`
          ${CHECKSUM}
          \`\`\`

          **Build Information:**
          - Build Date: ${BUILD_TIME}
          - Commit: ${GITHUB_SHA}
          - Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

          echo "тЬЕ Release notes generated"
        env:
          TAG_NAME: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', env.VERSION) }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          prerelease: ${{ env.PRERELEASE }}
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', env.VERSION) }}
          name: MacDown ${{ env.VERSION }}
          files: |
            build/MacDown-${{ env.VERSION }}.dmg
            build/MacDown-${{ env.VERSION }}.dmg.sha256
          body_path: build/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==================== CLEANUP ====================

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          echo "ЁЯз╣ Keychain cleaned up"

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            notarization-response.json
          retention-days: 7

      - name: Upload DMG artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dmg-unstapled
          path: build/MacDown-*.dmg*
          retention-days: 7
